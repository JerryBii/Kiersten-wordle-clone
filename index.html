<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kiersten — The Daily Word</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #1a1a1f;
    --surface: #25252d;
    --border: #3a3a45;
    --text: #e8e6e0;
    --text-muted: #7a7a8a;
    --correct: #c8a84b;    /* golden — correct position */
    --present: #6a8cbf;    /* blue — in word, wrong position */
    --absent: #3c3c48;     /* dark — not in word */
    --tile-empty: #25252d;
    --tile-border: #4a4a58;
    --key-bg: #3c3c4a;
    --key-text: #e8e6e0;
    --green: #5a9e6f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 700px;
    padding: 12px 20px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  header h1 span {
    color: var(--correct);
  }

  .subtitle {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #message-bar {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: var(--text);
    font-weight: 600;
  }

  #message-bar .msg {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  #message-bar .msg.show {
    opacity: 1;
  }

  /* BOARD */
  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: clamp(3px, 1vw, 6px);
    padding: 8px 0 12px;
    width: 100%;
    max-width: min(96vw, 480px);
    margin: 0 auto;
    box-sizing: border-box;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: clamp(3px, 1vw, 6px);
  }

  .tile {
    width: 100%;
    aspect-ratio: 1;
    border: 2px solid var(--tile-border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.75rem, 3.5vw, 1.4rem);
    font-weight: 700;
    color: var(--text);
    background: var(--tile-empty);
    transition: border-color 0.1s;
    position: relative;
    transform-style: preserve-3d;
  }

  .tile.filled {
    border-color: var(--text-muted);
    animation: pop 0.1s ease;
  }

  .tile.shake {
    animation: shake 0.4s ease;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-5px); }
    40%       { transform: translateX(5px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  @keyframes flipIn {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flipOut {
    0%   { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }

  .tile.flip-in {
    animation: flipIn 0.2s ease forwards;
  }
  .tile.flip-out {
    animation: flipOut 0.2s ease forwards;
  }

  .tile.correct   { background: var(--correct); border-color: var(--correct); color: #1a1a1f; }
  .tile.present   { background: var(--present); border-color: var(--present); color: #fff; }
  .tile.absent    { background: var(--absent);  border-color: var(--absent);  color: var(--text-muted); }

  /* bounce animation for win */
  .tile.bounce {
    animation: bounce 0.5s ease forwards;
  }
  @keyframes bounce {
    0%   { transform: translateY(0); }
    30%  { transform: translateY(-18px); }
    60%  { transform: translateY(-6px); }
    80%  { transform: translateY(-12px); }
    100% { transform: translateY(0); }
  }

  /* KEYBOARD */
  #keyboard {
    width: 100%;
    max-width: min(96vw, 520px);
    padding: 0 4px 24px;
    display: flex;
    flex-direction: column;
    gap: clamp(4px, 1.2vw, 7px);
    box-sizing: border-box;
    margin: 0 auto;
  }

  .key-row {
    display: flex;
    gap: clamp(3px, 1vw, 5px);
    justify-content: center;
  }

  .key {
    background: var(--key-bg);
    color: var(--key-text);
    border: none;
    border-radius: 5px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(0.6rem, 2.5vw, 0.8rem);
    cursor: pointer;
    height: clamp(40px, 10vw, 54px);
    min-width: clamp(22px, 6.5vw, 34px);
    padding: 0 2px;
    transition: background 0.15s, transform 0.08s;
    letter-spacing: 0.01em;
    user-select: none;
    flex: 1;
    max-width: clamp(28px, 8vw, 42px);
  }

  .key:active { transform: scale(0.94); }

  .key.wide {
    min-width: clamp(36px, 10vw, 54px);
    max-width: clamp(44px, 13vw, 68px);
    font-size: clamp(0.52rem, 2vw, 0.72rem);
    flex: 1.6;
  }

  .key.correct { background: var(--correct); color: #1a1a1f; }
  .key.present { background: var(--present); color: #fff; }
  .key.absent  { background: #2a2a35; color: #555566; }

  /* end screen overlay */
  #end-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,15,20,0.82);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  #end-overlay.show { display: flex; }

  .end-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: clamp(20px, 5vw, 36px) clamp(16px, 6vw, 40px);
    text-align: center;
    max-width: 340px;
    width: 90%;
  }

  .end-card h2 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.1rem, 5vw, 1.5rem);
    margin-bottom: 8px;
  }

  .end-card .answer-reveal {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.3rem, 6vw, 2rem);
    font-weight: 700;
    color: var(--correct);
    letter-spacing: 0.08em;
    margin: 14px 0 8px;
  }

  .end-card p {
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 22px;
  }

  .end-card .next-info {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 14px;
    letter-spacing: 0.04em;
  }

  .btn-play-again {
    background: var(--correct);
    color: #1a1a1f;
    border: none;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 12px 30px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .btn-play-again:hover { opacity: 0.88; }

  .btn-share {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 12px 30px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
    margin-left: 8px;
  }
  .btn-share:hover { background: var(--surface); }
  .btn-share.copied { color: var(--correct); border-color: var(--correct); }
  .btn-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
</style>
</head>

const VALID_GUESSES = new Set([...VALID_WORDS_8, MAIN_WORD]);

function getTodaysSeed() {
  const now = new Date();
  return now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
}

// Seeded random (simple mulberry32)
function seededRandom(seed) {
  let t = seed + 0x6D2B79F5;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

function getTodaysWord() {
  const seed = getTodaysSeed();
  const r = seededRandom(seed);
  if (r < 0.99) return MAIN_WORD;
  // Pick from fallback pool deterministically
  const idx = Math.floor(seededRandom(seed * 3 + 7) * FALLBACK_WORDS.length);
  return FALLBACK_WORDS[idx];
}

// ── Game state ──────────────────────────────────────────────────────
let TARGET = getTodaysWord();
const MAX_GUESSES = 6;
const WORD_LEN = 8;
let guesses = [];      // array of strings
let currentInput = []; // letters typed so far
let gameOver = false;

// ── Build board ─────────────────────────────────────────────────────
const board = document.getElementById('board');
let tiles = [];

function buildBoard() {
  board.innerHTML = '';
  tiles = [];
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    const rowTiles = [];
    for (let c = 0; c < WORD_LEN; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      row.appendChild(tile);
      rowTiles.push(tile);
    }
    board.appendChild(row);
    tiles.push(rowTiles);
  }
}

// ── Build keyboard ──────────────────────────────────────────────────
const ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];

let keyEls = {};

function buildKeyboard() {
  ROWS.forEach((keys, i) => {
    const rowEl = document.getElementById(`row${i+1}`);
    rowEl.innerHTML = '';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
      keyEls[k] = btn;
    });
  });
}

// ── Keyboard state tracker ──────────────────────────────────────────
let keyStates = {}; // letter -> 'correct' | 'present' | 'absent'

function updateKeyState(letter, state) {
  const priority = { correct: 3, present: 2, absent: 1 };
  const cur = keyStates[letter];
  if (!cur || priority[state] > priority[cur]) {
    keyStates[letter] = state;
    if (keyEls[letter]) {
      keyEls[letter].className = 'key ' + state;
    }
  }
}

// ── Input handling ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameOver) return;
  const k = e.key.toUpperCase();
  if (k === 'ENTER') handleKey('ENTER');
  else if (k === 'BACKSPACE') handleKey('⌫');
  else if (/^[A-Z]$/.test(k)) handleKey(k);
});

function handleKey(k) {
  if (gameOver) return;
  const row = guesses.length;
  if (k === '⌫') {
    if (currentInput.length > 0) {
      currentInput.pop();
      tiles[row][currentInput.length].textContent = '';
      tiles[row][currentInput.length].classList.remove('filled');
    }
  } else if (k === 'ENTER') {
    submitGuess();
  } else if (/^[A-Z]$/.test(k) && currentInput.length < WORD_LEN) {
    currentInput.push(k);
    const tile = tiles[row][currentInput.length - 1];
    tile.textContent = k;
    tile.classList.add('filled');
  }
}

function showMessage(txt, duration = 1800) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

function shakeRow(row) {
  tiles[row].forEach(t => {
    t.classList.remove('shake');
    void t.offsetWidth; // reflow
    t.classList.add('shake');
  });
}

function submitGuess() {
  const row = guesses.length;
  if (currentInput.length < WORD_LEN) {
    showMessage('Not enough letters');
    shakeRow(row);
    return;
  }
  const word = currentInput.join('');

  if (!VALID_GUESSES.has(word)) {
    showMessage('Not in word list');
    shakeRow(row);
    return;
  }

  guesses.push(word);
  revealRow(row, word, () => {
    const won = word === TARGET;
    if (won) {
      gameOver = true;
      setTimeout(() => {
        bounceRow(row);
        setTimeout(() => showEndCard(true, row + 1), 600);
      }, 200);
    } else if (guesses.length >= MAX_GUESSES) {
      gameOver = true;
      setTimeout(() => showEndCard(false, null), 400);
    }
  });
  currentInput = [];
}

function getLetterStates(guess, target) {
  const states = Array(WORD_LEN).fill('absent');
  const targetArr = target.split('');
  const guessArr = guess.split('');
  const targetCount = {};

  // First pass: mark correct
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessArr[i] === targetArr[i]) {
      states[i] = 'correct';
      targetCount[targetArr[i]] = (targetCount[targetArr[i]] || 0) - 1; // mark used
    } else {
      targetCount[targetArr[i]] = (targetCount[targetArr[i]] || 0) + 1;
    }
  }

  // Second pass: mark present
  for (let i = 0; i < WORD_LEN; i++) {
    if (states[i] === 'correct') continue;
    if (targetCount[guessArr[i]] && targetCount[guessArr[i]] > 0) {
      states[i] = 'present';
      targetCount[guessArr[i]]--;
    }
  }

  return states;
}

function revealRow(row, word, onDone) {
  const states = getLetterStates(word, TARGET);
  const delay = 280;

  tiles[row].forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('flip-in');
      setTimeout(() => {
        tile.classList.remove('flip-in');
        tile.classList.add(states[i]);
        tile.classList.add('flip-out');
        setTimeout(() => tile.classList.remove('flip-out'), 200);
        updateKeyState(word[i], states[i]);
        if (i === WORD_LEN - 1) setTimeout(onDone, 250);
      }, 200);
    }, i * delay);
  });
}

function bounceRow(row) {
  tiles[row].forEach((tile, i) => {
    setTimeout(() => tile.classList.add('bounce'), i * 80);
  });
}

// ── End card ────────────────────────────────────────────────────────
const WIN_MSGS = [
  'Genius!!', 'Magnificent!', 'Impressive!',
  'Splendid!', 'Great!', 'Phew!'
];

function showEndCard(won, attempts) {
  const overlay = document.getElementById('end-overlay');
  const title = document.getElementById('end-title');
  const wordEl = document.getElementById('end-word');
  const desc = document.getElementById('end-desc');

  wordEl.textContent = TARGET;

  if (won) {
    title.textContent = (WIN_MSGS[attempts - 1] || '🎉 You got it!');
    desc.textContent = `You solved it in ${attempts} ${attempts === 1 ? 'guess' : 'guesses'}. The word was above.`;
  } else {
    title.textContent = 'Better luck tomorrow!';
    desc.textContent = "You ran out of guesses. The answer was:";
  }

  overlay.classList.add('show');
}

function resetGame() {
  TARGET = getTodaysWord();
  guesses = [];
  currentInput = [];
  gameOver = false;
  keyStates = {};
  document.getElementById('end-overlay').classList.remove('show');
  buildBoard();
  // reset key colors
  Object.values(keyEls).forEach(k => {
    k.className = 'key' + (k.textContent.length > 1 ? ' wide' : '');
  });
}

// ── Share ───────────────────────────────────────────────────────────
function buildEmojiGrid() {
  const lines = [];
  const won = guesses.length > 0 && guesses[guesses.length - 1] === TARGET;
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  lines.push(`KIERSTEN Wordle — ${dateStr}`);
  lines.push(won ? `${guesses.length}/6` : 'X/6');
  lines.push('');
  for (const guess of guesses) {
    const states = getLetterStates(guess, TARGET);
    const row = states.map(s => {
      if (s === 'correct') return '🟨';   // gold to match game theme
      if (s === 'present') return '🟦';   // blue
      return '⬛';
    }).join('');
    lines.push(row);
  }
  return lines.join('\n');
}

function shareResult() {
  const text = buildEmojiGrid();
  const btn = document.getElementById('share-btn');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied! ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Share 📋';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for browsers that block clipboard
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied! ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Share 📋';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── Init ─────────────────────────────────────────────────────────────
buildBoard();
buildKeyboard();
</script>
